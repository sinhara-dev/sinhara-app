<div class="sales">
  <div class="sales-header">
    <div class="header-item">
      <div class="label">Total Sales</div>
      <div class="value" id="salesTotal">₹--</div>
    </div>

    <div class="header-item">
      <div class="label">After Commission</div>
      <div class="value" id="salesCommission">₹--</div>
    </div>

    <div class="header-item">
      <div class="label">After Expense</div>
      <div class="value" id="salesProfit">₹--</div>
    </div>
  </div>

  <div class="month-refresh-row">
    <div></div>
    <input class="month-chip" id="salesMonthPicker" type="month" />
    <button class="refresh-btn" id="salesRefreshButton">⟳</button>
  </div>

  <div id="salesList"></div>
</div>
