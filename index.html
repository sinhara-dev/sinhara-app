<!doctype html>
<html>
  <head>
    <link rel="icon" href="assets/icons/favicon.png" />
    <link rel="manifest" href="manifest.json" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Force full-screen mode for Apple iOS Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Sinhara" />

    <!-- Force full-screen mode for Android Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />

    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="modules/login/login.css" />
    <link rel="stylesheet" href="modules/dashboard/dashboard.css" />
    <link rel="stylesheet" href="modules/inventory/inventory.css" />
    <link rel="stylesheet" href="modules/sales/sales.css" />
    <link rel="stylesheet" href="modules/expense/expense.css" />
  </head>

  <body>
    <div id="statusMessage"></div>

    <div id="loadingSpinner">
      <div class="spinner"></div>
    </div>

    <div id="loginView"></div>

    <div id="appView">
      <div class="bottom-tab-bar">
        <div id="tab-dashboard" class="tab">Dashboard</div>
        <div id="tab-inventory" class="tab">Inventory</div>
        <div id="tab-sales" class="tab">Sales</div>
        <div id="tab-expenses" class="tab">Expenses</div>
      </div>

      <div id="tabViews">
        <div id="dashboardView" class="view"></div>
        <div id="inventoryView" class="view"></div>
        <div id="salesView" class="view"></div>
        <div id="expenseView" class="view"></div>
      </div>

      <div id="imagePreviewOverlay">
        <img id="imagePreview" src="" onclick="event.stopPropagation()" />
      </div>

      <div id="actionModal" class="action-modal" style="display: none">
        <div class="action-modal-content">
          <div class="action-modal-header">
            <h3 id="actionModalTitle">Action</h3>

            <button id="actionModalCloseBtn" class="modal-close-btn">✕</button>
          </div>

          <div id="actionModalBody"></div>
        </div>
      </div>
    </div>
    <script type="module" src="main.js"></script>
  </body>
</html>
